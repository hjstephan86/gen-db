version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: gendb-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gendb
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      # Persistente Datenbank
      - postgres_data:/var/lib/postgresql/data
      # Init-Script
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gendb-network
    restart: unless-stopped

  # Gen API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gendb-api
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: gendb
      SUBGRAPH_CLI_PATH: /usr/local/bin/subgraph-cli
      SUBGRAPH_MAX_WORKERS: 4
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Hot-reload für Development (optional)
      - ./src:/app/src
    networks:
      - gendb-network
    restart: unless-stopped
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # pgAdmin für DB-Verwaltung (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gendb-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - gendb-network
    profiles:
      - debug  # Nur mit: docker-compose --profile debug up

networks:
  gendb-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

# =============================================================================
# Usage:
# 
# Development (alle Services):
#   docker-compose up -d
# 
# Development mit pgAdmin:
#   docker-compose --profile debug up -d
# 
# Logs anschauen:
#   docker-compose logs -f api
#   docker-compose logs -f postgres
# 
# Stoppen:
#   docker-compose down
# 
# Reset (Delete data):
#   docker-compose down -v
# 
# Nur API neu bauen:
#   docker-compose build api
#   docker-compose up -d api
# 
# =============================================================================
