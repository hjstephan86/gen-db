---
# Namespace für Gen-DB
apiVersion: v1
kind: Namespace
metadata:
  name: gen-db
  labels:
    name: gen-db

---
# ConfigMap für Konfiguration
apiVersion: v1
kind: ConfigMap
metadata:
  name: gen-db-config
  namespace: gen-db
data:
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  DATABASE_HOST: "postgres.gen-db.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "gendb"
  SUBGRAPH_MAX_WORKERS: "4"
  CONTAINER_ENV: "production"
  ENABLE_PROMETHEUS: "false"

---
# Secret für Sensitive Daten
apiVersion: v1
kind: Secret
metadata:
  name: gen-db-secrets
  namespace: gen-db
type: Opaque
stringData:
  DATABASE_USER: postgres
  DATABASE_PASSWORD: "change-this-secure-password"
  SECRET_KEY: "change-this-secret-key-production"
  SUBGRAPH_CLI_PATH: "/usr/local/bin/subgraph-cli"

---
# PersistentVolumeClaim für PostgreSQL
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: gen-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

---
# StatefulSet für PostgreSQL
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: gen-db
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: gen-db-secrets
              key: DATABASE_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gen-db-secrets
              key: DATABASE_PASSWORD
        - name: POSTGRES_DB
          value: gendb
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d/
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init-scripts
        configMap:
          name: init-scripts
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi

---
# Service für PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: gen-db
spec:
  selector:
    app: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  clusterIP: None  # Headless Service

---
# Deployment für Gen-DB API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gen-db-api
  namespace: gen-db
  labels:
    app: gen-db-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gen-db-api
  template:
    metadata:
      labels:
        app: gen-db-api
        version: v1
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - gen-db-api
              topologyKey: kubernetes.io/hostname
      
      containers:
      - name: api
        image: ghcr.io/hjstephan86/gen-db:latest  # Update mit deinem Registry
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
        
        envFrom:
        - configMapRef:
            name: gen-db-config
        - secretRef:
            name: gen-db-secrets
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

---
# Service für Gen-DB API
apiVersion: v1
kind: Service
metadata:
  name: gen-db-api
  namespace: gen-db
  labels:
    app: gen-db-api
spec:
  type: LoadBalancer
  selector:
    app: gen-db-api
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP

---
# HorizontalPodAutoscaler für Auto-Scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gen-db-api-hpa
  namespace: gen-db
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gen-db-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15

---
# NetworkPolicy für Security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gen-db-network-policy
  namespace: gen-db
spec:
  podSelector:
    matchLabels:
      app: gen-db-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: gen-db
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: gen-db
    ports:
    - protocol: TCP
      port: 5432

---
# PodDisruptionBudget für Hochverfügbarkeit
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gen-db-api-pdb
  namespace: gen-db
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: gen-db-api

---
# Ingress für HTTP/HTTPS Traffic
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gen-db-ingress
  namespace: gen-db
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.gen-db.local  # Update mit deinem Hostname
    secretName: gen-db-tls
  rules:
  - host: api.gen-db.local  # Update mit deinem Hostname
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gen-db-api
            port:
              name: http

---
# RBAC: ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gen-db-sa
  namespace: gen-db

---
# RBAC: Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gen-db-role
  namespace: gen-db
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]

---
# RBAC: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gen-db-rolebinding
  namespace: gen-db
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gen-db-role
subjects:
- kind: ServiceAccount
  name: gen-db-sa
  namespace: gen-db
